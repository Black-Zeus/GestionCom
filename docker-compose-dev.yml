x-logging: &default-logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "5"

x-runtime: &runtime-defaults
  restart: unless-stopped
  security_opt:
    - no-new-privileges:true

x-timezone-env: &timezone-env
  TZ: ${TZ:-America/Santiago}

x-deploy-tiny: &deploy-tiny
  resources:
    limits:
      cpus: "0.25"
      memory: 128M
    reservations:
      cpus: "0.1"
      memory: 64M

x-deploy-small: &deploy-small
  resources:
    limits:
      cpus: "0.5"
      memory: 256M
    reservations:
      cpus: "0.25"
      memory: 128M

x-deploy-medium: &deploy-medium
  resources:
    limits:
      cpus: "1"
      memory: 512M
    reservations:
      cpus: "0.5"
      memory: 256M

x-deploy-db: &deploy-db
  resources:
    limits:
      cpus: "1"
      memory: 1G
    reservations:
      cpus: "0.5"
      memory: 512M

services:
  nginx:
    <<: *runtime-defaults
    container_name: ${PROJECT_NAME}-nginx
    build:
      context: .
      dockerfile: docker/dev/dockerfile.nginx.dev
      args:
        - NGINX_PORT_INTERNAL=${NGINX_PORT_INTERNAL}
    image: ${PROJECT_NAME}/nginx:dev.v0.1
    labels:
      stack: ${PROJECT_NAME}
      env: ${ENV}
      service.group: core
      service.lifecycle: runtime
    depends_on:
      frontend:
        condition: service_healthy
      backend-api:
        condition: service_healthy
      events-orchestrator:
        condition: service_healthy
    volumes:
      - nginx_logs:/var/log/nginx
      - ./Shared/nginx:/shared
    environment:
      <<: *timezone-env
      PROJECT_NAME: ${PROJECT_NAME}
      FRONTEND_PORT_INTERNAL: ${FRONTEND_PORT_INTERNAL}
      BACKEND_API_PORT_INTERNAL: ${BACKEND_API_PORT_INTERNAL}
      EVENTS_ORCHESTRATOR_PORT_INTERNAL: ${EVENTS_ORCHESTRATOR_PORT_INTERNAL}
    ports:
      - "${NGINX_PORT}:${NGINX_PORT_INTERNAL}"
    networks:
      - ${EXTERNAL_NETWORK}
      - ${INTERNAL_NETWORK}
    logging: *default-logging
    deploy: *deploy-tiny
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    <<: *runtime-defaults
    container_name: ${PROJECT_NAME}-frontend
    build:
      context: .
      dockerfile: docker/dev/dockerfile.frontend.dev
      args:
        - FRONTEND_PORT_INTERNAL=${FRONTEND_PORT_INTERNAL}
    image: ${PROJECT_NAME}/frontend:dev.v0.1
    labels:
      stack: ${PROJECT_NAME}
      env: ${ENV}
      service.group: core
      service.lifecycle: runtime
    volumes:
      - ./volumes/frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_logs:/var/log/app
      - ./Shared/frontend:/shared
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT_INTERNAL}"
    command: ["npm", "run", "dev"]
    depends_on:
      backend-api:
        condition: service_healthy
    environment:
      <<: *timezone-env
      ENV: ${ENV}
      NODE_ENV: development
    networks:
      - ${INTERNAL_NETWORK}
    env_file:
      - ./volumes/frontend/.env
    logging: *default-logging
    deploy: *deploy-medium
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:${FRONTEND_PORT_INTERNAL}/').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  backend-api:
    <<: *runtime-defaults
    container_name: ${PROJECT_NAME}-backend-api
    build:
      context: .
      dockerfile: docker/dev/dockerfile.backend-api
      args:
        - BACKEND_API_PORT_INTERNAL=${BACKEND_API_PORT_INTERNAL}
    image: ${PROJECT_NAME}/backend-api:dev.v0.1
    labels:
      stack: ${PROJECT_NAME}
      env: ${ENV}
      service.group: core
      service.lifecycle: runtime
    volumes:
      - ./volumes/backend-api:/app
      - backend_api_logs:/var/log/app
      - ./Shared/backend-api:/shared
    depends_on:
      mariadb:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    ports:
      - "${BACKEND_API_PORT}:${BACKEND_API_PORT_INTERNAL}"
    command: uvicorn main:app --host ${BACKEND_API_HOST} --port ${BACKEND_API_PORT_INTERNAL} --reload
    networks:
      - ${INTERNAL_NETWORK}
    env_file:
      - ./volumes/backend-api/.env
    environment:
      <<: *timezone-env
      EVENTS_PUBLISH_TOKEN: ${EVENTS_PUBLISH_TOKEN}
      MINIO_HOST: ${MINIO_HOST}
      MINIO_PORT: ${MINIO_PORT}
      MINIO_PUBLIC_HOST: ${MINIO_PUBLIC_HOST:-localhost}
      MINIO_PUBLIC_PORT: ${MINIO_PUBLIC_PORT:-9000}
      MINIO_PUBLIC_SECURE: ${MINIO_PUBLIC_SECURE:-false}
      MINIO_REGION: ${MINIO_REGION:-us-east-1}
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_MEDIA_BUCKET: ${MINIO_MEDIA_BUCKET:-gestioncom-media}
    secrets:
      - backend_api_secret_key
      - mysql_password
      - redis_password
      - minio_root_user
      - minio_root_password
    logging: *default-logging
    deploy: *deploy-medium
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${BACKEND_API_PORT_INTERNAL}/health/', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  events-orchestrator:
    <<: *runtime-defaults
    container_name: ${PROJECT_NAME}-events-orchestrator
    build:
      context: .
      dockerfile: docker/dev/dockerfile.events-orchestrator
    image: ${PROJECT_NAME}/events-orchestrator:dev.v0.1
    labels:
      stack: ${PROJECT_NAME}
      env: ${ENV}
      service.group: core
      service.lifecycle: runtime
    volumes:
      - ./volumes/events-orchestrator:/app
      - events_orchestrator_logs:/var/log/app
    depends_on:
      redis:
        condition: service_healthy
      backend-api:
        condition: service_healthy
    expose:
      - "${EVENTS_ORCHESTRATOR_PORT_INTERNAL}"
    command: uvicorn main:app --host ${EVENTS_ORCHESTRATOR_HOST} --port ${EVENTS_ORCHESTRATOR_PORT_INTERNAL} --reload --no-access-log
    networks:
      - ${INTERNAL_NETWORK}
    env_file:
      - ./volumes/events-orchestrator/.env
    environment:
      <<: *timezone-env
      ENVIRONMENT: ${ENV}
      EVENTS_PUBLISH_TOKEN: ${EVENTS_PUBLISH_TOKEN}
    secrets:
      - redis_password
    logging: *default-logging
    deploy: *deploy-small
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${EVENTS_ORCHESTRATOR_PORT_INTERNAL}/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  backend-worker:
    <<: *runtime-defaults
    container_name: ${PROJECT_NAME}-backend-worker
    build:
      context: .
      dockerfile: docker/dev/dockerfile.backend-worker
    image: ${PROJECT_NAME}/backend-worker:dev.v0.1
    labels:
      stack: ${PROJECT_NAME}
      env: ${ENV}
      service.group: core
      service.lifecycle: runtime
    volumes:
      - ./volumes/backend-worker:/app
      - backend_worker_logs:/var/log/app
      - ./Shared/backend-worker:/shared
    networks:
      - ${INTERNAL_NETWORK}
    depends_on:
      redis:
        condition: service_healthy
      mariadb:
        condition: service_healthy
    command: ["celery", "-A", "tasks", "worker", "--loglevel=${WORKER_LOG_LEVEL}", "--queues=${WORKER_QUEUES}", "--concurrency=${WORKER_CONCURRENCY}"]
    env_file:
      - ./volumes/backend-worker/.env
    environment:
      <<: *timezone-env
    secrets:
      - redis_password
    logging: *default-logging
    deploy: *deploy-medium
    healthcheck:
      test: ["CMD", "celery", "-A", "tasks", "inspect", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  backend-beat:
    <<: *runtime-defaults
    container_name: ${PROJECT_NAME}-backend-beat
    profiles:
      - scheduler
    build:
      context: .
      dockerfile: docker/dev/dockerfile.backend-worker
    image: ${PROJECT_NAME}/backend-beat:dev.v0.1
    labels:
      stack: ${PROJECT_NAME}
      env: ${ENV}
      service.group: scheduler
      service.lifecycle: runtime
    volumes:
      - ./volumes/backend-worker:/app
      - backend_beat_logs:/var/log/app
      - celerybeat_data:/var/lib/celerybeat
      - ./Shared/backend-beat:/shared
    networks:
      - ${INTERNAL_NETWORK}
    depends_on:
      redis:
        condition: service_healthy
      backend-worker:
        condition: service_healthy
    command: ["celery", "-A", "beat", "beat", "--loglevel=${WORKER_LOG_LEVEL}", "--pidfile=/var/lib/celerybeat/celerybeat.pid", "--schedule=/var/lib/celerybeat/celerybeat-schedule"]
    env_file:
      - ./volumes/backend-worker/.env
    environment:
      <<: *timezone-env
    secrets:
      - redis_password
    logging: *default-logging
    deploy: *deploy-small

  minio:
    <<: *runtime-defaults
    container_name: ${PROJECT_NAME}-minio
    build:
      context: .
      dockerfile: docker/dockerfile.minio
      args:
        - MINIO_PORT=${MINIO_PORT}
        - MINIO_CONSOLE_PORT=${MINIO_CONSOLE_PORT}
    image: ${PROJECT_NAME}/minio:dev.v0.1
    labels:
      stack: ${PROJECT_NAME}
      env: ${ENV}
      service.group: dependency
      service.lifecycle: stateful
    volumes:
      - minio_data:/data
      - minio_logs:/var/log/minio
      - ./Shared/minio:/shared
    ports:
      - "${MINIO_PORT}:${MINIO_PORT}"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    environment:
      <<: *timezone-env
      MINIO_ROOT_USER_FILE: /run/secrets/minio_root_user
      MINIO_ROOT_PASSWORD_FILE: /run/secrets/minio_root_password
      MINIO_PORT: ${MINIO_PORT}
      MINIO_CONSOLE_PORT: ${MINIO_CONSOLE_PORT}
      MINIO_CONSOLE_ADDRESS: ":${MINIO_CONSOLE_PORT}"
    secrets:
      - minio_root_user
      - minio_root_password
    logging: *default-logging
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MINIO_PORT}/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 60s
    networks:
      - ${INTERNAL_NETWORK}
    deploy: *deploy-medium

  mailpit:
    <<: *runtime-defaults
    container_name: ${PROJECT_NAME}-mailpit
    profiles:
      - tools
    image: axllent/mailpit:v1.28
    ports:
      - "${MAILPIT_SMTP_PORT}:${MAILPIT_SMTP_PORT}"
      - "${MAILPIT_UI_PORT}:${MAILPIT_UI_PORT}"
    labels:
      stack: ${PROJECT_NAME}
      env: ${ENV}
      service.group: tools
      service.lifecycle: support
    volumes:
      - mailpit_data:/data
      - mailpit_logs:/var/log/mailpit
      - ./Shared/mailpit:/shared
    environment:
      <<: *timezone-env
      MP_STORAGE: ${MAILPIT_STORAGE}
      MP_UI_COLOR: ${MAILPIT_UI_COLOR}
      MP_LOGGING: "true"
      MP_SMTP_BIND_ADDR: "0.0.0.0:${MAILPIT_SMTP_PORT}"
      MP_UI_BIND_ADDR: "0.0.0.0:${MAILPIT_UI_PORT}"
    logging: *default-logging
    networks:
      - ${INTERNAL_NETWORK}
    deploy: *deploy-tiny
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:${MAILPIT_UI_PORT}"]
      interval: 30s
      timeout: 10s
      retries: 3

  mariadb:
    <<: *runtime-defaults
    container_name: ${PROJECT_NAME}-mariadb
    build:
      context: .
      dockerfile: docker/dockerfile.mysql
      args:
        - MYSQL_PORT=${MYSQL_PORT}
    image: ${PROJECT_NAME}/mariadb:10.6
    ports:
      - "${MYSQL_PORT}:${MYSQL_PORT}"
    labels:
      stack: ${PROJECT_NAME}
      env: ${ENV}
      service.group: dependency
      service.lifecycle: stateful
    volumes:
      - mariadb_data:/var/lib/mysql
      - mariadb_logs:/var/log/mysql
      - ./scripts/mariadb/entrypoint:/docker-entrypoint-initdb.d:ro
      - ./Shared/mariadb:/shared
    environment:
      <<: *timezone-env
      MYSQL_ROOT_PASSWORD_FILE: /run/secrets/mysql_root_password
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD_FILE: /run/secrets/mysql_password
      MYSQL_INITDB_SKIP_TZINFO: 1
    secrets:
      - mysql_root_password
      - mysql_password
    logging: *default-logging
    networks:
      - ${INTERNAL_NETWORK}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u root -p$$(cat /run/secrets/mysql_root_password)"]
      interval: 30s
      retries: 5
      timeout: 10s
      start_period: 60s
    deploy: *deploy-db

  redis:
    <<: *runtime-defaults
    build:
      context: .
      dockerfile: docker/dockerfile.redis
      args:
        - REDIS_PORT=${REDIS_PORT}
    image: ${PROJECT_NAME}/redis:7.2
    container_name: ${PROJECT_NAME}-redis
    ports:
      - "${REDIS_PORT}:${REDIS_PORT}"
    labels:
      stack: ${PROJECT_NAME}
      env: ${ENV}
      service.group: dependency
      service.lifecycle: stateful
    volumes:
      - redis_data:/data
      - redis_logs:/var/log/redis
      - ./scripts/redis/redis.conf:/etc/redis/redis.conf:ro
      - ./Shared/redis:/shared
    secrets:
      - redis_password
    environment:
      <<: *timezone-env
    logging: *default-logging
    networks:
      - ${INTERNAL_NETWORK}
    command: ["sh", "-c", "redis-server /etc/redis/redis.conf --requirepass \"$$(cat /run/secrets/redis_password)\""]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli --no-auth-warning -a \"$$(cat /run/secrets/redis_password)\" ping"]
      interval: 30s
      retries: 5
      timeout: 10s
      start_period: 30s
    deploy: *deploy-small

  redisinsight:
    <<: *runtime-defaults
    build:
      context: .
      dockerfile: docker/dev/dockerfile.redisinsight
    image: ${PROJECT_NAME}/redisinsight:dev.v0.1
    container_name: ${PROJECT_NAME}-redisinsight
    profiles:
      - tools
    labels:
      stack: ${PROJECT_NAME}
      env: ${ENV}
      service.group: tools
      service.lifecycle: support
    ports:
      - "${REDIS_PORT_PANEL}:5540"
    volumes:
      - redisinsight_data:/db
      - ./Shared/redisinsight:/shared
    depends_on:
      redis:
        condition: service_healthy
    environment:
      <<: *timezone-env
      REDIS_PASSWORD_FILE: /run/secrets/redis_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
    secrets:
      - redis_password
    networks:
      - ${INTERNAL_NETWORK}
    logging: *default-logging
    deploy: *deploy-tiny
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5540"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  internal:
    driver: bridge
    name: ${PROJECT_NAME}_internal
    ipam:
      config:
        - subnet: ${INTERNAL_SUBNET}
  external:
    driver: bridge
    name: ${PROJECT_NAME}_external
    ipam:
      config:
        - subnet: ${EXTERNAL_SUBNET}

secrets:
  backend_api_secret_key:
    file: ${BACKEND_API_SECRET_KEY_FILE:-./secrets/dev/backend_api_secret_key.txt}
  mysql_root_password:
    file: ${MYSQL_ROOT_PASSWORD_FILE:-./secrets/dev/mysql_root_password.txt}
  mysql_password:
    file: ${MYSQL_PASSWORD_FILE:-./secrets/dev/mysql_password.txt}
  redis_password:
    file: ${REDIS_PASSWORD_FILE:-./secrets/dev/redis_password.txt}
  minio_root_user:
    file: ${MINIO_ROOT_USER_FILE:-./secrets/dev/minio_root_user.txt}
  minio_root_password:
    file: ${MINIO_ROOT_PASSWORD_FILE:-./secrets/dev/minio_root_password.txt}

volumes:
  frontend_node_modules:
  nginx_logs:
  frontend_logs:
  backend_api_logs:
  events_orchestrator_logs:
  backend_worker_logs:
  backend_beat_logs:
  minio_logs:
  mailpit_logs:
  mariadb_logs:
  redis_logs:
  minio_data:
  mailpit_data:
  mariadb_data:
  redis_data:
  redisinsight_data:
  celerybeat_data:
